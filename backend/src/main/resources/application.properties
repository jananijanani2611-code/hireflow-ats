spring.application.name=backend

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/hireflow_ats?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Mysql@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---- Server ----
server.port=8080

# ---- JWT ----
# 256-bit secret (change this in production, store as env var)
jwt.secret=hireflowSecretKeyForJwtSigningMustBeAtLeast256BitsLong123456
jwt.expiration=86400000
