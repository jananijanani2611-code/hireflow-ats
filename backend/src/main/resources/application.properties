spring.application.name=backend

# ---- PostgreSQL Database ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hireflow_ats}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
server.port=${PORT:8080}

# ---- JWT ----
# Set JWT_SECRET as an environment variable in production — never commit real secrets.
jwt.secret=${JWT_SECRET:hireflowSecretKeyForJwtSigningMustBeAtLeast256BitsLong123456}
jwt.expiration=86400000

# ---- CORS ----
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
