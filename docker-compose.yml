# For local development / testing only — spins up MySQL + the backend together.
# Usage: docker compose up --build
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hireflow_ats
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/hireflow_ats?createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: local_dev_only_secret_change_me_1234567890
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  mysql-data:
